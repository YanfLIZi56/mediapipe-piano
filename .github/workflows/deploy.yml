name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download MediaPipe files
        run: |
          set -e
          mkdir -p public/mediapipe
          MP_VERSION="0.4.1675469240"
          MP_BASE="https://cdn.jsdelivr.net/npm/@mediapipe/hands@${MP_VERSION}"
          curl -sL "${MP_BASE}/hands.js" -o public/mediapipe/hands.js
          curl -sL "${MP_BASE}/hands.binarypb" -o public/mediapipe/hands.binarypb
          curl -sL "${MP_BASE}/hands_solution_packed_assets.data" -o public/mediapipe/hands_solution_packed_assets.data
          curl -sL "${MP_BASE}/hands_solution_wasm_bin.js" -o public/mediapipe/hands_solution_wasm_bin.js
          curl -sL "${MP_BASE}/hands_solution_wasm_bin.wasm" -o public/mediapipe/hands_solution_wasm_bin.wasm
          curl -sL "${MP_BASE}/hands_solution_simd_wasm_bin.js" -o public/mediapipe/hands_solution_simd_wasm_bin.js
          curl -sL "${MP_BASE}/hands_solution_simd_wasm_bin.wasm" -o public/mediapipe/hands_solution_simd_wasm_bin.wasm
          curl -sL "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" -o public/mediapipe/camera_utils.js
          curl -sL "https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" -o public/mediapipe/drawing_utils.js
          echo "=== Downloaded files: ==="
          ls -lh public/mediapipe/
          echo "=== Verifying JS files are not HTML error pages ==="
          ! head -1 public/mediapipe/hands.js | grep -q '<!DOCTYPE\|<html'
          ! head -1 public/mediapipe/camera_utils.js | grep -q '<!DOCTYPE\|<html'
          ! head -1 public/mediapipe/drawing_utils.js | grep -q '<!DOCTYPE\|<html'
          echo "=== All files OK ==="

      - name: Build
        run: npx vite build
        env:
          DEPLOY_TARGET: github-pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4